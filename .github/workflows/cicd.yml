name: CICD

on:
  workflow_dispatch: #delievery-(manual)
    inputs:    #filters
      environment:
        description: This is the environment value where this workflow runs
        default: 'dev'
        required: true
        type: choice
        options:
          - dev
          - prod
          - staging

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        run: echo "Code cloned from GitHub"

  build:
    needs: code  #pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Build Docker container
        run: echo "Docker container built"

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Test the container
        run: echo "Testing the container"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploying the container
        run: echo "Deployed the container"
